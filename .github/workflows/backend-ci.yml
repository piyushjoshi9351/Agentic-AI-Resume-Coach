name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      CI: true
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # fetch full history so refs like pull/*/merge are available
          fetch-depth: 0
          # explicitly pass the runner token
          token: ${{ secrets.GITHUB_TOKEN }}
          # keep credentials for any further git operations
          persist-credentials: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Syntax validation (py_compile)
        run: python -m py_compile $(git ls-files "*.py")

      - name: Run smoke tests (in-process)
        run: python scripts/smoke_test_client.py

      - name: Build Docker image
        run: docker build -t agentic-ai-resume-coach .
