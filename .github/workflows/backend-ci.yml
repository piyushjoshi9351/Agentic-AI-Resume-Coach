name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      CI: true
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # fetch full history so refs like pull/*/merge are available
          fetch-depth: 0
          # explicitly pass the runner token
          token: ${{ secrets.GITHUB_TOKEN }}
          # keep credentials for any further git operations
          persist-credentials: true
          # avoid trying to fetch submodules or LFS which can trigger auth prompts
          submodules: false
          lfs: false
          clean: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies (no cache)
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r requirements.txt

      - name: "Debug: show installed httpx and pip freeze"
        run: |
          python -c "import importlib, sys; print('python', sys.version)"
          python -c "import httpx; print('httpx==', httpx.__version__)"
          pip freeze | sort

      - name: Syntax validation (py_compile)
        run: python -m py_compile $(git ls-files "*.py")

      - name: Run smoke tests (in-process)
        run: python scripts/smoke_test_client.py

      - name: Build Docker image
        run: docker build -t agentic-ai-resume-coach .
